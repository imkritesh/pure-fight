<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureStorage Wars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- UI Container -->
        <div class="ui-container">
            <!-- Player 1 Health -->
            <div class="health-bar-bg">
                <div id="playerHealth" class="health-bar"></div>
            </div>
            
            <!-- Timer -->
            <div id="timer" class="timer">60</div>
            
            <!-- Player 2 Health -->
            <div class="health-bar-bg" style="justify-content: flex-end;">
                <div id="enemyHealth" class="health-bar"></div>
            </div>
        </div>
        
        <div id="displayText" class="display-text">
            <span id="winnerText">Tie</span>
            <button id="restartBtn">Restart Game</button>
        </div>

        <!-- Canvas -->
        <canvas></canvas>

        <div class="controls-container">
            <div class="player-controls">
                <h3 class="p1-title">Player 1</h3>
                <p>Move: Arrow Keys</p>
                <p>Punch: K &nbsp;|&nbsp; Kick: L</p>
            </div>
            <div class="player-controls right-align">
                <h3 class="p2-title">Player 2</h3>
                <p>Move: Arrow Keys</p>
                <p>Punch: K &nbsp;|&nbsp; Kick: L</p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="index.js"></script>
</body>
</html>
